<svg width="1120" height="2720" viewBox="0 0 1120 2720" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Lưu đồ thuật toán tạo và cập nhật Level</title>
  <desc>Vẽ đúng theo logic LevelCreationService: tạo/cập nhật Level 1, Level 2, các Level điển hình và Level mái.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#444"/>
    </marker>
    <style>
      .line { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .shape { fill:#fff; stroke:#555; stroke-width:2; }
      .text { font-family:Arial, 'Segoe UI', sans-serif; font-size:16px; font-weight:700; fill:#555; text-anchor:middle; dominant-baseline:middle; }
      .small { font-family:Arial, 'Segoe UI', sans-serif; font-size:14px; font-weight:700; fill:#555; text-anchor:middle; dominant-baseline:middle; }
      .label { font-family:Arial, 'Segoe UI', sans-serif; font-size:13px; font-weight:700; fill:#555; text-anchor:middle; }
    </style>
  </defs>

  <rect x="4" y="4" width="1112" height="2712" fill="#fff" stroke="#e5e5e5"/>

  <ellipse cx="560" cy="50" rx="88" ry="30" class="shape"/>
  <text x="560" y="50" class="text">BẮT ĐẦU</text>
  <path d="M560 80 L560 125" class="line"/>

  <path d="M370 125 L750 125 L710 210 L330 210 Z" class="shape"/>
  <text x="560" y="154" class="text">NHẬP THÔNG TIN LEVEL</text>
  <text x="560" y="180" class="small">SỐ TẦNG, H TẦNG 1, H TẦNG ĐIỂN HÌNH</text>
  <path d="M560 210 L560 260" class="line"/>

  <polygon points="560,260 750,340 560,420 370,340" class="shape"/>
  <text x="560" y="326" class="text">KIỂM TRA</text>
  <text x="560" y="352" class="small">DỮ LIỆU HỢP LỆ?</text>

  <path d="M370 340 L220 340" class="line"/>
  <text x="295" y="326" class="label">SAI</text>
  <path d="M560 420 L560 485" class="line"/>
  <text x="590" y="455" class="label">ĐÚNG</text>

  <path d="M95 295 L220 295 L220 385 L95 385 Q75 362 95 340 Q115 318 95 295 Z" class="shape"/>
  <text x="158" y="335" class="text">THÔNG BÁO LỖI</text>
  <path d="M158 385 L158 2600 L465 2600" class="line"/>

  <polygon points="560,485 760,575 560,665 360,575" class="shape"/>
  <text x="560" y="562" class="text">CÓ LEVEL 1</text>
  <text x="560" y="588" class="small">THEO TÊN TRONG REVIT?</text>

  <path d="M760 575 L940 575 L940 1065 L780 1065" class="line"/>
  <text x="850" y="562" class="label">CÓ</text>
  <path d="M560 665 L560 745" class="line"/>
  <text x="590" y="706" class="label">KHÔNG</text>

  <polygon points="560,745 760,835 560,925 360,835" class="shape"/>
  <text x="560" y="822" class="text">CÓ LEVEL GẦN</text>
  <text x="560" y="848" class="small">CAO ĐỘ 0?</text>

  <path d="M760 835 L900 835 L900 1065 L780 1065" class="line"/>
  <text x="830" y="822" class="label">CÓ</text>
  <path d="M560 925 L560 995" class="line"/>
  <text x="590" y="960" class="label">KHÔNG</text>

  <rect x="395" y="995" width="330" height="82" rx="8" class="shape"/>
  <text x="560" y="1023" class="text">TẠO LEVEL 1 MỚI</text>
  <text x="560" y="1049" class="small">CAO ĐỘ = 0</text>
  <path d="M560 1077 L560 1125" class="line"/>

  <rect x="365" y="1125" width="390" height="82" rx="8" class="shape"/>
  <text x="560" y="1153" class="text">CHỌN LEVEL LÀM GỐC</text>
  <text x="560" y="1179" class="small">LEVEL ĐÃ TÌM ĐƯỢC HOẶC LEVEL VỪA TẠO</text>
  <path d="M560 1207 L560 1280" class="line"/>

  <rect x="360" y="1280" width="400" height="76" rx="8" class="shape"/>
  <text x="560" y="1307" class="text">LẤY CAO ĐỘ GỐC</text>
  <text x="560" y="1333" class="small">BASE ELEVATION = CAO ĐỘ LEVEL GỐC</text>
  <path d="M560 1356 L560 1430" class="line"/>

  <rect x="395" y="1430" width="330" height="68" rx="8" class="shape"/>
  <text x="560" y="1464" class="text">ĐẶT index = 2</text>
  <path d="M560 1498 L560 1575" class="line"/>

  <polygon points="560,1575 760,1660 560,1745 360,1660" class="shape"/>
  <text x="560" y="1646" class="text">index &lt;= SỐ TẦNG + 1?</text>
  <text x="560" y="1672" class="small">CÒN LEVEL CẦN TẠO?</text>

  <path d="M360 1660 L240 1660 L240 2600 L370 2600" class="line"/>
  <text x="300" y="1646" class="label">KHÔNG</text>
  <path d="M560 1745 L560 1815" class="line"/>
  <text x="590" y="1782" class="label">CÓ</text>

  <rect x="350" y="1815" width="420" height="90" rx="8" class="shape"/>
  <text x="560" y="1844" class="text">XÁC ĐỊNH TÊN VÀ CAO ĐỘ</text>
  <text x="560" y="1870" class="small">LEVEL CUỐI = LEVEL MÁI</text>
  <text x="560" y="1894" class="small">CÒN LẠI = LEVEL index</text>
  <path d="M560 1905 L560 1970" class="line"/>

  <polygon points="560,1970 755,2050 560,2130 365,2050" class="shape"/>
  <text x="560" y="2037" class="text">TỒN TẠI</text>
  <text x="560" y="2063" class="small">LEVEL THEO TÊN?</text>

  <path d="M560 2130 L560 2185" class="line"/>
  <text x="590" y="2160" class="label">CÓ</text>
  <rect x="350" y="2185" width="420" height="78" rx="8" class="shape"/>
  <text x="560" y="2212" class="text">NẾU CAO ĐỘ SAI THÌ CẬP NHẬT</text>
  <text x="560" y="2238" class="small">existingByName.Elevation = targetElevation</text>

  <path d="M755 2050 L895 2050" class="line"/>
  <text x="825" y="2037" class="label">KHÔNG</text>
  <polygon points="895,1975 1060,2050 895,2125 730,2050" class="shape"/>
  <text x="895" y="2038" class="text">TỒN TẠI LEVEL</text>
  <text x="895" y="2062" class="small">ĐÚNG CAO ĐỘ?</text>

  <path d="M895 2125 L895 2185" class="line"/>
  <text x="925" y="2158" class="label">CÓ</text>
  <rect x="760" y="2185" width="270" height="78" rx="8" class="shape"/>
  <text x="895" y="2212" class="text">ĐỔI TÊN LEVEL</text>
  <text x="895" y="2238" class="small">TrySetLevelName</text>

  <path d="M1060 2050 L1085 2050 L1085 2285 L895 2285" class="line"/>
  <text x="1072" y="2037" class="label">KHÔNG</text>
  <rect x="760" y="2285" width="270" height="78" rx="8" class="shape"/>
  <text x="895" y="2312" class="text">TẠO LEVEL MỚI</text>
  <text x="895" y="2338" class="small">Level.Create(targetElevation)</text>

  <path d="M560 2263 L560 2400" class="line"/>
  <path d="M895 2263 L895 2400 L770 2400" class="line"/>
  <path d="M895 2363 L895 2400 L770 2400" class="line"/>
  <rect x="350" y="2400" width="420" height="72" rx="8" class="shape"/>
  <text x="560" y="2425" class="text">THÊM LEVEL VÀO DANH SÁCH</text>
  <text x="560" y="2448" class="small">index = index + 1, QUAY LẠI KIỂM TRA</text>
  <path d="M770 2436 L880 2436 L880 1660 L760 1660" class="line"/>

  <rect x="370" y="2600" width="380" height="76" rx="8" class="shape"/>
  <text x="560" y="2626" class="text">TRẢ VỀ DANH SÁCH LEVEL</text>
  <text x="560" y="2652" class="small">LEVEL 1 ... LEVEL MÁI</text>
  <path d="M560 2676 L560 2680" class="line"/>

  <ellipse cx="560" cy="2680" rx="95" ry="30" class="shape"/>
  <text x="560" y="2680" class="text">KẾT THÚC</text>
</svg>
