<svg width="980" height="1730" viewBox="0 0 980 1730" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Lưu đồ thuật toán tạo nhiều tầng trong Revit từ dữ liệu CAD tầng 1</title>
  <desc>Luồng tạo Level, lưới trục, cột, dầm và sàn nhiều tầng theo số tầng, chiều cao tầng 1 và chiều cao tầng điển hình.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 24px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .note { font: 400 13px Segoe UI, Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 16px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px Segoe UI, Arial, sans-serif; fill: #334155; }
      .label { font: 600 13px Segoe UI, Arial, sans-serif; fill: #334155; }
      .flow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .flow-soft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .start { fill: #f8fafc; stroke: #475569; stroke-width: 1.5; }
      .input { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .process { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
      .action { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; }
      .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .error { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
      .output { fill: #ecfccb; stroke: #65a30d; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="980" height="1730" fill="#ffffff"/>
  <text x="490" y="42" text-anchor="middle" class="title">Lưu đồ thuật toán tạo nhiều tầng trong Revit</text>
  <text x="490" y="66" text-anchor="middle" class="note">Dữ liệu tầng 1 đọc từ CAD: lưới trục, cột, dầm, sàn. Đơn vị nhập: mm.</text>

  <!-- Start -->
  <rect x="365" y="92" width="250" height="56" rx="28" class="start"/>
  <text x="490" y="126" text-anchor="middle" class="box-title">BẮT ĐẦU</text>
  <path d="M490 148 L490 184" class="flow"/>

  <!-- Input -->
  <rect x="225" y="184" width="530" height="92" rx="10" class="input"/>
  <text x="490" y="211" text-anchor="middle" class="box-title">Nhập thông số từ giao diện</text>
  <text x="490" y="235" text-anchor="middle" class="box-text">Số tầng n, H tầng 1 h1, H tầng điển hình ht</text>
  <text x="490" y="255" text-anchor="middle" class="box-text">Base/Top Offset cột, Level/Z Offset dầm-sàn, cấu kiện được tích chọn</text>
  <path d="M490 276 L490 322" class="flow"/>

  <!-- Validate -->
  <polygon points="490,322 660,390 490,458 320,390" class="decision"/>
  <text x="490" y="378" text-anchor="middle" class="box-title">Dữ liệu nhập hợp lệ?</text>
  <text x="490" y="402" text-anchor="middle" class="box-text">n &gt;= 1, h1 &gt; 0</text>
  <text x="490" y="422" text-anchor="middle" class="box-text">n &gt; 1 thì ht &gt; 0</text>

  <!-- Error branch -->
  <path d="M320 390 L180 390" class="flow"/>
  <text x="250" y="376" text-anchor="middle" class="label">Không</text>
  <rect x="58" y="356" width="122" height="68" rx="10" class="error"/>
  <text x="119" y="384" text-anchor="middle" class="box-title">Báo lỗi</text>
  <text x="119" y="406" text-anchor="middle" class="box-text">Nhập lại</text>
  <path d="M119 356 L119 230 L225 230" class="flow-soft"/>

  <!-- Yes branch -->
  <path d="M490 458 L490 504" class="flow"/>
  <text x="508" y="482" text-anchor="start" class="label">Có</text>

  <!-- CAD data -->
  <rect x="210" y="504" width="560" height="90" rx="10" class="process"/>
  <text x="490" y="532" text-anchor="middle" class="box-title">Kiểm tra dữ liệu CAD đã đọc</text>
  <text x="490" y="556" text-anchor="middle" class="box-text">Bắt buộc có lưới trục; chỉ xử lý cấu kiện người dùng tích chọn</text>
  <text x="490" y="576" text-anchor="middle" class="box-text">Không đọc/vẽ lại CAD nếu dữ liệu đã parse còn hợp lệ</text>
  <path d="M490 594 L490 640" class="flow"/>

  <!-- Level list -->
  <rect x="190" y="640" width="600" height="112" rx="10" class="action"/>
  <text x="490" y="668" text-anchor="middle" class="box-title">Tạo hoặc cập nhật danh sách Level</text>
  <text x="490" y="692" text-anchor="middle" class="box-text">Level 1 = 0 hoặc dùng Level gốc hiện có</text>
  <text x="490" y="712" text-anchor="middle" class="box-text">Level 2 = Level 1 + h1</text>
  <text x="490" y="732" text-anchor="middle" class="box-text">Level k = Level 2 + (k - 2) × ht, với k = 3..n+1</text>
  <path d="M490 752 L490 800" class="flow"/>

  <!-- Grid once -->
  <rect x="210" y="800" width="560" height="92" rx="10" class="process"/>
  <text x="490" y="828" text-anchor="middle" class="box-title">Vẽ lưới trục một lần từ CAD</text>
  <text x="490" y="852" text-anchor="middle" class="box-text">Grid dùng Revit API Grid, giữ đúng tọa độ theo bản vẽ CAD</text>
  <text x="490" y="872" text-anchor="middle" class="box-text">Kéo extents/level trong các hướng để bao phủ toàn bộ grid</text>
  <path d="M490 892 L490 938" class="flow"/>

  <!-- Loop init -->
  <rect x="315" y="938" width="350" height="60" rx="10" class="action"/>
  <text x="490" y="974" text-anchor="middle" class="box-title">Khởi tạo vòng lặp tầng: i = 1</text>
  <path d="M490 998 L490 1046" class="flow"/>

  <!-- Loop condition -->
  <polygon points="490,1046 650,1110 490,1174 330,1110" class="decision"/>
  <text x="490" y="1104" text-anchor="middle" class="box-title">i ≤ n ?</text>
  <text x="490" y="1128" text-anchor="middle" class="box-text">Còn tầng cần tạo</text>

  <!-- No branch -->
  <path d="M650 1110 L850 1110 L850 1508 L680 1508" class="flow-soft"/>
  <text x="735" y="1096" text-anchor="middle" class="label">Không</text>

  <!-- Yes branch -->
  <path d="M490 1174 L490 1218" class="flow"/>
  <text x="508" y="1197" text-anchor="start" class="label">Có</text>

  <!-- Determine current floor -->
  <rect x="180" y="1218" width="620" height="92" rx="10" class="input"/>
  <text x="490" y="1246" text-anchor="middle" class="box-title">Xác định Level cho tầng i</text>
  <text x="490" y="1270" text-anchor="middle" class="box-text">BaseLevel = Level i, TopLevel = Level i + 1</text>
  <text x="490" y="1290" text-anchor="middle" class="box-text">Chiều cao tầng = Elevation(TopLevel) - Elevation(BaseLevel)</text>
  <path d="M490 1310 L490 1356" class="flow"/>

  <!-- Create elements by params -->
  <rect x="130" y="1356" width="720" height="110" rx="10" class="process"/>
  <text x="490" y="1384" text-anchor="middle" class="box-title">Tạo cấu kiện tầng i từ thông số CAD, không copy thô element</text>
  <text x="490" y="1408" text-anchor="middle" class="box-text">Cột: đặt tại tâm CAD, Base = Level i, Top = Level i+1, dùng Base/Top Offset</text>
  <text x="490" y="1428" text-anchor="middle" class="box-text">Dầm: vẽ theo centerline CAD, Level = Level i hoặc level người dùng chọn, dùng Z Offset</text>
  <text x="490" y="1448" text-anchor="middle" class="box-text">Sàn: vẽ Floor từ OuterLoop/OpeningLoops, type Generic, dùng Z Offset</text>
  <path d="M490 1466 L490 1514" class="flow"/>

  <!-- Log -->
  <rect x="230" y="1514" width="520" height="76" rx="10" class="output"/>
  <text x="490" y="1542" text-anchor="middle" class="box-title">Ghi nhận kết quả tầng i</text>
  <text x="490" y="1566" text-anchor="middle" class="box-text">Created / Skipped / Failed, lưu ElementId để focus sau khi vẽ</text>

  <!-- Loop back -->
  <path d="M230 1552 L92 1552 L92 968 L315 968" class="flow-soft"/>
  <text x="138" y="1536" text-anchor="start" class="label">i = i + 1</text>

  <!-- Finish -->
  <rect x="220" y="1476" width="460" height="64" rx="10" class="process"/>
  <text x="450" y="1502" text-anchor="middle" class="box-title">Ẩn CAD import, regenerate và focus kết quả</text>
  <text x="450" y="1524" text-anchor="middle" class="box-text">Hiển thị model đã tạo trong Revit</text>
  <path d="M450 1540 L450 1584" class="flow"/>

  <rect x="270" y="1584" width="360" height="62" rx="10" class="output"/>
  <text x="450" y="1612" text-anchor="middle" class="box-title">Thông báo hoàn thành</text>
  <text x="450" y="1634" text-anchor="middle" class="box-text">Tổng số cấu kiện tạo được / bỏ qua / lỗi</text>
  <path d="M450 1646 L450 1662" class="flow"/>

  <rect x="350" y="1662" width="200" height="48" rx="24" class="start"/>
  <text x="450" y="1691" text-anchor="middle" class="box-title">KẾT THÚC</text>
</svg>
